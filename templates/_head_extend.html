<style>
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  body > #wrapper {
    flex: 1;
    min-height: 0;
  }

  .site-header {
    margin-bottom: 0.5rem;
  }

  .site-header-inner {
    width: min(100% - 2rem, var(--main-max-width));
    margin: 0 auto;
    padding: 0.5rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .site-header-title {
    color: var(--text-color);
    text-decoration: none;
    font-size: 0.95rem;
  }

  .site-header-title:hover {
    color: var(--text-color);
  }

  body.blog #wrapper,
  body.prose-page #wrapper,
  body.tag-list #wrapper,
  body.tag-single #wrapper {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: auto;
    width: min(100%, var(--main-max-width));
    margin: 0 auto;
  }

  body.blog main,
  body.prose-page main,
  body.tag-list main,
  body.tag-single main,
  body.post main {
    width: 100%;
    min-height: auto;
    min-height: unset;
    flex: 1;
  }

  body.post aside {
    margin-top: 8em;
  }

  body.post aside .toc-label {
    color: var(--text-pale-color);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    padding: 0 1rem 0.4rem 3rem;
  }

  body.post aside nav a,
  .post-body .mobile-toc a {
    transition: color 120ms ease;
  }

  body.post aside nav a.active,
  body.post aside nav a.in-view,
  .post-body .mobile-toc a.active,
  .post-body .mobile-toc a.in-view {
    color: var(--text-color);
  }

  .mobile-toc {
    display: none;
  }

  body.post article.post-header-article {
    padding-bottom: 0;
  }

  .post-pagination {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
    margin-top: 3.5rem;
    padding: 0 15px;
    padding-top: 1.5rem;
    border-top: 1px solid var(--text-decoration-color);
  }

  .post-pagination-item {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .post-pagination-item.next {
    text-align: right;
  }

  .post-pagination-item:only-child {
    grid-column: 1 / -1;
  }

  .post-pagination-label {
    color: var(--text-pale-color);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .post-pagination-title {
    color: var(--text-color);
    font-size: 0.95rem;
    line-height: 1.45;
    text-decoration: none;
  }

  .post-pagination-title:hover {
    color: var(--primary-color);
  }

  .layout-list .post .date,
  .nightly-list .post span:first-child {
    font-variant-numeric: tabular-nums;
  }

  .nightly-desc {
    margin: 0 0 1em;
    color: var(--text-pale-color);
    font-size: 0.95em;
  }

  article.prose.show-heading-hashes h2::before,
  article.prose.show-heading-hashes h3::before,
  article.prose.show-heading-hashes h4::before,
  article.prose.show-heading-hashes h5::before,
  article.prose.show-heading-hashes h6::before {
    color: var(--text-pale-color);
    font-weight: 400;
    margin-right: 0.45rem;
  }

  article.prose.show-heading-hashes h2::before {
    content: "##";
  }

  article.prose.show-heading-hashes h3::before {
    content: "###";
  }

  article.prose.show-heading-hashes h4::before {
    content: "####";
  }

  article.prose.show-heading-hashes h5::before {
    content: "#####";
  }

  article.prose.show-heading-hashes h6::before {
    content: "######";
  }

  body.homepage #wrapper {
    width: min(100%, var(--homepage-max-width));
  }

  body.homepage main {
    min-height: 82vh;
    min-height: 82dvh;
    padding: 8rem 0 6rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  body.homepage #info {
    margin-bottom: 0.75rem;
  }

  body.homepage #links {
    margin: 2.75rem 0 3rem;
  }

  body.homepage #brief {
    margin-bottom: 1.5rem;
  }

  @media (max-width: 1400px) {
    body.homepage main {
      min-height: 76vh;
      min-height: 76dvh;
      padding: 5rem 0 4rem;
    }

    .site-header-inner {
      width: min(100% - 1.5rem, var(--main-max-width));
      padding: 0.4rem 0;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .post-pagination {
      grid-template-columns: 1fr;
    }

    body.post aside nav {
      display: none;
    }

    .post-body .mobile-toc {
      display: block;
      margin: 0 15px 2.5rem;
      border: 1px solid color-mix(in srgb, var(--text-decoration-color) 70%, transparent);
      border-radius: 12px;
      background: color-mix(in srgb, var(--primary-color) 1.5%, var(--bg-color));
      overflow: hidden;
      box-shadow: none;
    }

    .post-body .mobile-toc summary {
      cursor: pointer;
      list-style: none;
      padding: 0.6rem 0.85rem;
      color: var(--text-pale-color);
      font-size: 0.88rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border: 0;
      background: transparent;
    }

    .post-body .mobile-toc summary::-webkit-details-marker {
      display: none;
    }

    .post-body .mobile-toc summary::after {
      content: "+";
      color: var(--text-pale-color);
      font-size: 0.9rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .post-body .mobile-toc summary::before {
      content: attr(data-label);
    }

    .post-body .mobile-toc[open] summary::after {
      content: "-";
    }

    .post-body .mobile-toc nav {
      padding: 0 0.5rem 0.34rem;
      color: var(--text-pale-color);
    }

    .post-body .mobile-toc ul {
      margin: 0;
      padding: 0 0 0.4rem 1.5rem;
    }

    .post-body .mobile-toc li + li {
      margin-top: 0.45rem;
    }

    .post-body .mobile-toc ul ul {
      margin-top: 0.45rem;
    }

    .post-body .mobile-toc a {
      color: var(--text-pale-color);
      text-decoration: none;
      font-size: 0.88rem;
    }

    .post-body .mobile-toc a:hover {
      color: var(--primary-color);
    }

    .post-body .mobile-toc a.active,
    .post-body .mobile-toc a.in-view {
      color: var(--text-color);
    }
  }

  #links #right a[aria-label="RSS"] {
    opacity: 0.8;
  }

  .bouten {
    text-emphasis: filled sesame;
    -webkit-text-emphasis: filled sesame;
    text-emphasis-position: over right;
    -webkit-text-emphasis-position: over right;
  }

  .prose blockquote {
    color: #585858;
  }

</style>

{% if page and page.summary %}
{% set social_desc = page.summary %}
{% elif page and page.description %}
{% set social_desc = page.description %}
{% elif section and section.description %}
{% set social_desc = section.description %}
{% else %}
{% set social_desc = config.description %}
{% endif %}

<meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ config.title }}{% elif section.title %}{{ section.title }} | {{ config.title }}{% else %}{{ config.title }}{% endif %}">
<meta property="og:description" content="{{ social_desc }}">
<meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
<meta property="og:type" content="{% if page %}article{% else %}website{% endif %}">
<meta property="og:site_name" content="{{ config.title }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {{ config.title }}{% elif section.title %}{{ section.title }} | {{ config.title }}{% else %}{{ config.title }}{% endif %}">
<meta name="twitter:description" content="{{ social_desc }}">
